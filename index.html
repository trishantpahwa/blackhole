<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Basic SEO Meta Tags -->
    <title>Black Hole | Multiplayer Board Game</title>
    <meta name="description" content="Play Black Hole online - a strategic, mathematical multiplayer board game of survival. Compete with players globally or locally." />
    <meta name="keywords" content="Black Hole, board game, paper game, multiplayer game, strategy game, math game, survival game, online game" />
    <meta name="author" content="Trishant Pahwa" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Black Hole | Multiplayer Board Game | Paper Game" />
    <meta property="og:description" content="Play Black Hole online - a strategic, mathematical multiplayer board game of survival." />
    <meta property="og:url" content="https://blackhole-web-app.onrender.com/" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Black Hole | Multiplayer Board Game" />
    <meta property="twitter:description" content="Play Black Hole online - a strategic, mathematical multiplayer board game of survival." />
    <link rel="stylesheet" href="./style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="particles-bg"></div>
    <div class="glass-container">
      <header style="position: relative;">
        <h1>BLACK HOLE</h1>
        <div id="online-users" style="position: absolute; top: 10px; right: 10px; font-size: 0.9rem; color: var(--primary); display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 20px; border: 1px solid var(--glass-border);">
          <span class="pulse-dot"></span> <span id="online-count">1</span> Online
        </div>
        <p class="subtitle">A mathematical battle for survival</p>
      </header>

      <div id="alerts-container"></div>

      <!-- Main Menu Navigation -->
      <section id="menu-screen" class="screen active">
        <div class="menu-box glass-panel">
          <h2>Play Online</h2>
          
          <div class="form-group">
            <label for="num-players">Number of Players</label>
            <select id="num-players">
              <option value="2" selected>2 Players</option>
              <option value="3">3 Players</option>
              <option value="4">4 Players</option>
            </select>
          </div>

          <div class="form-group">
            <label for="board-size">Board Size (Rows)</label>
            <select id="board-size">
              <option value="5">5 Rows (15 Circles) - Fast game</option>
              <option value="6" selected>6 Rows (21 Circles) - Standard</option>
              <option value="9">9 Rows (45 Circles) - Long game</option>
              <option value="10">10 Rows (55 Circles) - Epic game</option>
            </select>
          </div>

          <div class="action-buttons">
            <button id="btn-public" class="btn primary">Matchmaking (Public)</button>
            <div class="divider"><span>OR</span></div>
            <button id="btn-create-private" class="btn secondary">Create Private Room</button>
            <div class="join-private">
              <input type="text" id="input-room-code" placeholder="Enter Room Code..." />
              <button id="btn-join-private" class="btn tertiary">Join Room</button>
            </div>
          </div>
          <div class="inspiration-video" style="margin-top: 2rem; display: flex; flex-direction: column; align-items: center;">
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">Inspired by this Instagram Reel:</p>
            <iframe src="https://www.instagram.com/reel/DTfiLOTDbq1/embed/?autoplay=1" width="320" height="400" frameborder="0" scrolling="no" allowtransparency="true" allow="encrypted-media; autoplay" style="border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: transparent;"></iframe>
          </div>
        </div>
      </section>

      <!-- Waiting Area -->
      <section id="waiting-screen" class="screen">
        <div class="glass-panel text-center">
          <h2 class="pulse-text">Waiting for Opponent...</h2>
          <p id="room-code-display" class="highlight-text"></p>
          <div class="loader"></div>
        </div>
      </section>

      <!-- Game Board -->
      <section id="game-screen" class="screen">
        <div class="game-top" style="margin-bottom: 2rem; display: flex; flex-direction: column; gap: 1rem;">
          <div class="turn-indicator glass-panel" style="align-self: center; padding: 0.5rem 2rem;">
            <h3 id="turn-text" style="font-size: 1.2rem;">TURN</h3>
            <p id="current-move-text">Placing: <span class="badge">1</span></p>
          </div>
          <div class="game-header" id="players-container" style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 0;">
            <!-- Player cards injected dynamically -->
          </div>
        </div>
        
        <div class="board-container">
          <div id="board" class="pyramid-grid"></div>
        </div>

        <div class="game-footer">
          <button id="btn-leave" class="btn danger outline">Leave Game</button>
        </div>
      </section>
      
      <!-- Game Over Modal -->
      <div id="game-over-modal" class="modal">
        <div class="modal-content glass-panel text-center">
          <h2 id="winner-text" class="gradient-text">Game Over</h2>
          <div class="results" id="game-over-results" style="margin-bottom: 1rem;">
          </div>
          <p class="note text-muted">Winner is the player who lost the LEAST sum of tokens.</p>
          <button id="btn-play-again" class="btn primary mt-4">Return to Menu</button>
        </div>
      </div>
    </div>
    
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
